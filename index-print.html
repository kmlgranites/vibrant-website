<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Vibrant — The studio behind the page (Print)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/site.css" />
  <link rel="icon" href="assets/logo-vibrant-color.svg" />
  <style>
    /* Force backgrounds/colors to print */
    html, body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

    @media print {
      @page { size: A4 portrait; margin: 0; }

      /* sticky header would repeat awkwardly — make it static */
      header { position: static !important; backdrop-filter: none !important; -webkit-backdrop-filter: none !important; }

      /* freeze all animations at end-state */
      *, *::before, *::after {
        animation-delay: -99s !important;
        animation-duration: .001s !important;
        animation-iteration-count: 1 !important;
        animation-fill-mode: both !important;
        animation-play-state: running !important;
        transition-duration: 0s !important;
      }

      /* avoid splitting key blocks across pages */
      section { break-inside: avoid; }
      .card-lift, figure { break-inside: avoid; }

      /* hide hover-only affordances cleanly */
      .card-lift:hover { transform: none !important; box-shadow: none !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="app/Shell.jsx"></script>
  <script type="text/babel" src="app/Home.jsx"></script>

  <script type="text/babel">
    function App() {
      return (
        <div data-screen-label="Home">
          <Header />
          <HomePage />
          <Footer />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);

    // Auto-print once fonts + render settle
    async function readyToPrint() {
      try { if (document.fonts && document.fonts.ready) await document.fonts.ready; } catch (e) {}
      // wait for the logo images to load
      const imgs = Array.from(document.images);
      await Promise.all(imgs.map(img => img.complete ? Promise.resolve() :
        new Promise(res => { img.onload = img.onerror = res; })));
      setTimeout(() => window.print(), 600);
    }
    requestAnimationFrame(() => requestAnimationFrame(readyToPrint));
  </script>
</body>
</html>
